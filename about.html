<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnugglePals - About the Authors</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5efe6;
    margin: 20px;
}

.about-header {
    background: linear-gradient(135deg, #e3f2fd, #fff0f6, #e6e6fa);
    padding: 20px;
    text-align: center;
    border-radius: 20px;
    box-shadow: 2px 2px 10px #e6d6f5;
}

.nav a {
    text-decoration: none;
    margin: 0 8px;
    padding: 6px 12px;
    border-radius: 12px;
    background: #d0e8ff;
    color: #333;
    transition: 0.3s;
}

.nav a:hover {
    background: #fff0f6;
}

.about-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 25px;
}

.card {
    background: #fff0f6;
    width: 220px;
    padding: 15px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 2px 2px 12px #e6d6f5;
    transition: transform 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.pfp {
    width: 90px;
    height: 90px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid #d0e8ff;
    padding: 3px;
    background: #ffffff;
    box-shadow: 0 0 10px #e6d6f5;
    margin-bottom: 10px;
}

.back-btn {
    display: block;
    text-align: center;
    margin: 25px auto 0;
    background: #d0e8ff;
    padding: 10px;
    border-radius: 15px;
    text-decoration: none;
    color: #000;
    width: 200px;
}

.back-btn:hover {
    background: #fff0f6;
}
</style>

</head>

<body>

<header class="about-header">
<h1>🧸 SnugglePals Team</h1>
<p>Made with love, pastel dreams, and plushie energy 💕</p>

<nav class="nav">

    <a href="about.html">👩‍💻 Authors</a>
</nav>
</header>

<h2>Denise Kim</h2>
<p>HTML Structure & Layout</p>
</div>

<div class="card">
<img src="https://static.vecteezy.com/system/resources/previews/069/877/958/non_2x/a-cute-cartoon-shark-with-a-smile-on-its-face-vector.jpg" alt="Member 2" class="pfp">

<p>CSS Design & Theme</p>
</div>

<div class="card">

</div>

</div>

</html>
